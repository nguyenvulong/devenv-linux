# devenv-linux headless install config.
# This mirrors `./devenv --all`: every built-in component is enabled.
# Edit enabled/version values, then run:
# ./devenv --config devenv.example.toml

# System packages

[[components]]
id = "base-deps"
enabled = true

# Shells

[[components]]
id = "fish"
enabled = true
version = "latest"

# Editor

[[components]]
id = "neovim"
enabled = true
version = "latest"

# Languages

[[components]]
id = "rust"
enabled = true
version = "latest"

[[components]]
id = "node"
enabled = true
version = "latest"

[[components]]
id = "go"
enabled = true
version = "latest"

[[components]]
id = "python"
enabled = true
version = "latest"

# CLI tools

[[components]]
id = "fzf"
enabled = true
version = "latest"

[[components]]
id = "ripgrep"
enabled = true
version = "latest"

[[components]]
id = "fd"
enabled = true
version = "latest"

[[components]]
id = "bat"
enabled = true
version = "latest"

[[components]]
id = "eza"
enabled = true
version = "latest"

[[components]]
id = "glow"
enabled = true
version = "latest"

[[components]]
id = "jaq"
enabled = true
version = "latest"

[[components]]
id = "zellij"
enabled = true
version = "latest"

# Configurations

[[components]]
id = "config-bash"
enabled = true

[[components]]
id = "config-fish"
enabled = true

[[components]]
id = "config-nvim"
enabled = true
