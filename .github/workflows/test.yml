name: Test Installer (Ratatui TUI)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            run_as_root: false
          - distro: debian-13
            image: debian:trixie
            run_as_root: false
          - distro: fedora-43
            image: fedora:43
            run_as_root: true
          - distro: arch
            image: archlinux:latest
            run_as_root: false

    container:
      image: ${{ matrix.image }}
      options: --privileged

    steps:
      # ── Prerequisites ──────────────────────────────────────────────────────
      - name: Install prerequisites
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update
            apt-get install -y sudo git curl wget ca-certificates build-essential
          elif command -v dnf &>/dev/null; then
            dnf install -y git curl wget ca-certificates findutils gcc gcc-c++ make
          elif command -v pacman &>/dev/null; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm sudo git curl wget ca-certificates base-devel
          fi

      - name: Create test user (non-root distros)
        if: ${{ !matrix.run_as_root }}
        run: |
          useradd -m -s /bin/bash testuser
          echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser
          chmod 0440 /etc/sudoers.d/testuser

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build the Ratatui installer ────────────────────────────────────────
      # install.sh already handles rustup + cargo build; we drive it directly
      # here by calling bash install.sh. The installer detects CI=true and
      # drops into headless (--all) mode automatically, skipping the TUI.

      - name: Run installer (as user)
        if: ${{ !matrix.run_as_root }}
        env:
          CI: "true"
        run: |
          chown -R testuser:testuser .
          su - testuser -c "cd $(pwd) && bash install.sh"
        shell: bash

      - name: Run installer (as root)
        if: ${{ matrix.run_as_root }}
        env:
          CI: "true"
        run: bash install.sh
        shell: bash

      # ── Verify tools (mise shim paths) ────────────────────────────────────
      # mise installs shims to ~/.local/share/mise/shims/.
      # We add that (and ~/.cargo/bin for rustup-installed cargo) to PATH.

      - name: Verify tool installations (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            export PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
            echo "=== Checking installed tools ==="
            mise --version
            fzf --version
            rg --version
            fd --version
            bat --version
            eza --version
            glow --version
            jaq --version
            tmux -V
            rustc --version && cargo --version
            node --version
            go version
            uv --version
            nvim --version
            nu --version
            fish --version
            echo "=== All tools verified ==="
          '
        shell: bash

      - name: Verify tool installations (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          export PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
          echo "=== Checking installed tools ==="
          mise --version
          fzf --version
          rg --version
          fd --version
          bat --version
          eza --version
          glow --version
          jaq --version
          tmux -V
          rustc --version && cargo --version
          node --version
          go version
          uv --version
          nvim --version
          nu --version
          fish --version
          echo "=== All tools verified ==="
        shell: bash

      # ── Verify configurations ─────────────────────────────────────────────

      - name: Verify configurations (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            [ -d ~/.config/nvim ]  || { echo "Missing nvim config";  exit 1; }
            [ -d ~/.config/tmux ]  || { echo "Missing tmux config";  exit 1; }
            [ -d ~/.config/fish ]  || { echo "Missing fish config";  exit 1; }
            echo "=== All configurations verified ==="
          '
        shell: bash

      - name: Verify configurations (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          [ -d ~/.config/nvim ]  || { echo "Missing nvim config";  exit 1; }
          [ -d ~/.config/tmux ]  || { echo "Missing tmux config";  exit 1; }
          [ -d ~/.config/fish ]  || { echo "Missing fish config";  exit 1; }
          echo "=== All configurations verified ==="
        shell: bash

      # ── Smoke-test key tools ──────────────────────────────────────────────

      - name: Smoke test (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            export PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
            echo "test" | fzf -f "test"
            echo "test content" > /tmp/test.txt && rg "test" /tmp/test.txt
            node -e "console.log(\"Hello from Node.js\")"
            go version > /dev/null
            rustc --version > /dev/null
            echo "=== Smoke tests passed ==="
          '
        shell: bash

      - name: Smoke test (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          export PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
          echo "test" | fzf -f "test"
          echo "test content" > /tmp/test.txt && rg "test" /tmp/test.txt
          node -e "console.log(\"Hello from Node.js\")"
          go version > /dev/null
          rustc --version > /dev/null
          echo "=== Smoke tests passed ==="
        shell: bash
