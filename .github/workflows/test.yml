name: Test Installer (Ratatui TUI)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            run_as_root: false
          - distro: debian-13
            image: debian:trixie
            run_as_root: false
          - distro: fedora-43
            image: fedora:43
            run_as_root: true
          - distro: arch
            image: archlinux:latest
            run_as_root: false

    container:
      image: ${{ matrix.image }}
      options: --privileged

    steps:
      # ── Prerequisites ──────────────────────────────────────────────────────
      - name: Install prerequisites
        run: |
          if command -v apt-get &>/dev/null; then
            apt-get update
            apt-get install -y sudo git curl wget ca-certificates build-essential
          elif command -v dnf &>/dev/null; then
            dnf install -y git curl wget ca-certificates findutils gcc gcc-c++ make libatomic
          elif command -v pacman &>/dev/null; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm sudo git curl wget ca-certificates base-devel
          fi

      - name: Create test user (non-root distros)
        if: ${{ !matrix.run_as_root }}
        run: |
          useradd -m -s /bin/bash testuser
          echo "testuser ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/testuser
          chmod 0440 /etc/sudoers.d/testuser

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Install Rust (needed to compile the installer in CI) ───────────────
      # The release workflow publishes pre-built binaries for end-users.
      # The test workflow always compiles from source to validate the code.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── Build the devenv binary ────────────────────────────────────────────
      - name: Build devenv (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          chown -R testuser:testuser .
          su - testuser -c "cd $(pwd)/installer && cargo build --release"
        shell: bash

      - name: Build devenv (as root)
        if: ${{ matrix.run_as_root }}
        run: cargo build --release
        working-directory: installer

      # ── Run the installer in headless mode ─────────────────────────────────
      # --all forces headless mode: selects all components, no TUI, no TTY needed.

      - name: Run installer (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c "cd $(pwd) && installer/target/release/devenv --all"
        shell: bash

      - name: Run installer (as root)
        if: ${{ matrix.run_as_root }}
        run: installer/target/release/devenv --all
        shell: bash

      # ── Verify tools ──────────────────────────────────────────────────────
      # mise binary:  ~/.local/bin/mise
      # mise shims:   ~/.local/share/mise/shims/
      # cargo:        ~/.cargo/bin/
      # set -e ensures any missing tool fails the step immediately.

      - name: Verify tool installations (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            set -e
            export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
            echo "=== Checking installed tools ==="
            mise --version
            fzf --version
            rg --version
            fd --version
            bat --version
            eza --version
            glow --version
            jaq --version
            tmux -V
            rustc --version && cargo --version
            node --version
            go version
            uv --version
            nvim --version
            nu --version
            fish --version
            echo "=== All tools verified ==="
          '
        shell: bash

      - name: Verify tool installations (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          set -e
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
          echo "=== Checking installed tools ==="
          mise --version
          fzf --version
          rg --version
          fd --version
          bat --version
          eza --version
          glow --version
          jaq --version
          tmux -V
          rustc --version && cargo --version
          node --version
          go version
          uv --version
          nvim --version
          nu --version
          fish --version
          echo "=== All tools verified ==="
        shell: bash

      # ── Verify configurations ─────────────────────────────────────────────

      - name: Verify configurations (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            set -e
            [ -d ~/.config/nvim ]  || { echo "Missing nvim config";  exit 1; }
            [ -d ~/.config/tmux ]  || { echo "Missing tmux config";  exit 1; }
            [ -d ~/.config/fish ]  || { echo "Missing fish config";  exit 1; }
            echo "=== All configurations verified ==="
          '
        shell: bash

      - name: Verify configurations (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          set -e
          [ -d ~/.config/nvim ]  || { echo "Missing nvim config";  exit 1; }
          [ -d ~/.config/tmux ]  || { echo "Missing tmux config";  exit 1; }
          [ -d ~/.config/fish ]  || { echo "Missing fish config";  exit 1; }
          echo "=== All configurations verified ==="
        shell: bash

      # ── Smoke-test key tools ──────────────────────────────────────────────

      - name: Smoke test (as user)
        if: ${{ !matrix.run_as_root }}
        run: |
          su - testuser -c '
            set -e
            export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
            echo "test" | fzf -f "test"
            echo "test content" > /tmp/test.txt && rg "test" /tmp/test.txt
            node -e "console.log(\"Hello from Node.js\")"
            go version > /dev/null
            rustc --version > /dev/null
            echo "=== Smoke tests passed ==="
          '
        shell: bash

      - name: Smoke test (as root)
        if: ${{ matrix.run_as_root }}
        run: |
          set -e
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH"
          echo "test" | fzf -f "test"
          echo "test content" > /tmp/test.txt && rg "test" /tmp/test.txt
          node -e "console.log(\"Hello from Node.js\")"
          go version > /dev/null
          rustc --version > /dev/null
          echo "=== Smoke tests passed ==="
        shell: bash
